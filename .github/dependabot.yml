version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    open-pull-requests-limit: 10
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    groups:
      security:
        applies-to: security-updates
        patterns: ['*']
      minor-and-patch:
        applies-to: version-updates
        update-types: ['minor', 'patch']
        patterns: ['*']
    ignore:
      - dependency-name: 'shadcn-ui'
        # CLI tool, regenerated on demand; auto-bumps break local installs
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - 'dependencies'
