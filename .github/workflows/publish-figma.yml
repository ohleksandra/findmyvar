name: Publish to Figma

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-figma-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build plugin
        run: npm run build

      - name: Publish to Figma
        run: npx plugma release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
