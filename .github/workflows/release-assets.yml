name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-assets-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build, attach, and annotate release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build plugin
        run: npm run build

      - name: Package plugin
        run: npm run package

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "${{ github.event.release.tag_name }}" \
            "findmyvar-v${VERSION}.zip" \
            --clobber

      - name: Generate and apply release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CURRENT_TAG="${{ github.event.release.tag_name }}"
          REPO="${{ github.repository }}"

          # Make sure all remote tags are available so we can find the previous one.
          git fetch --tags --depth=1 origin "+refs/tags/*:refs/tags/*" 2>/dev/null || true

          # Find the previous tag (the one right before CURRENT_TAG, by semver order).
          PREVIOUS_TAG=$(git tag --sort=-version:refname \
            | awk -v current="$CURRENT_TAG" '$0 == current {found=1; next} found {print; exit}')

          # Authors: contributors between previous tag and current. Fall back to all-time
          # for the very first release.
          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          else
            RANGE="HEAD"
          fi

          AUTHORS=$(git log "$RANGE" --format='%an' | sort -u | awk '{print "- " $0}')
          AUTHOR_MENTIONS=$(git log "$RANGE" --format='%an' | sort -u | paste -sd ', ' -)

          COMMITS=$(git log "$RANGE" --format='- %s (%h)' | head -50)

          {
            echo "## What's Changed"
            echo
            echo "$COMMITS"
            echo
            echo "## Authors"
            echo
            echo "$AUTHORS"
            echo
            echo "## Changelog"
            echo
            echo "See [CHANGELOG.md](https://github.com/${REPO}/blob/${CURRENT_TAG}/CHANGELOG.md) for the full changelog."
            if [ -n "$PREVIOUS_TAG" ]; then
              echo
              echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
            fi
            echo
            echo "_Generated by the \`Release Assets\` workflow. Authors: ${AUTHOR_MENTIONS}._"
          } > /tmp/release-notes.md

          gh release edit "$CURRENT_TAG" --notes-file /tmp/release-notes.md
